[tool.pytest.ini_options]
pythonpath = [".", "scripts"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]
# E - pycodestyle errors
# F - pyflakes (undefined names, unused imports etc.)
# I - isort (import sorting)

[tool.ruff.lint.per-file-ignores]
# scripts/ run directly via `python scripts/foo.py`, so they insert the project root into
# sys.path before importing utils.slack — E402 fires on imports that follow that insertion.
"scripts/*.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"