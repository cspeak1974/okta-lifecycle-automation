[tool.pytest.ini_options]
pythonpath = [".", "scripts"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]
# E - pycodestyle errors
# F - pyflakes (undefined names, unused imports etc.)
# I - isort (import sorting)

[tool.ruff.format]
quote-style = "double"
indent-style = "space"